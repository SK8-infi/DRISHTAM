services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8080"
    environment:
      - PYTHONUNBUFFERED=1
      - DRISHTAM_ENV=production
      - DRISHTAM_ALLOWED_ORIGINS=http://localhost:3000,http://dashboard:3000
      - DRISHTAM_RATE_LIMIT=120
    restart: unless-stopped
    # Security: drop all capabilities, read-only root filesystem
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=256m
    # Writable cache for GCS downloads
    volumes:
      - api-cache:/app/cache
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_MMI_KEY=${MMI_KEY:-}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=128m
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

volumes:
  api-cache:

steps:
  # ── Build Backend API image ─────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/argus-ai/drishtam-api:$BUILD_ID'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/argus-ai/drishtam-api:latest'
      - '-f'
      - 'Dockerfile.api'
      - '.'

images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/argus-ai/drishtam-api:$BUILD_ID'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/argus-ai/drishtam-api:latest'

substitutions:
  _REGION: asia-south1

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

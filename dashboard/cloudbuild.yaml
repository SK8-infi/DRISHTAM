steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/argus-ai/drishtam-dashboard:$BUILD_ID'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/argus-ai/drishtam-dashboard:latest'
      - '--build-arg'
      - 'NEXT_PUBLIC_API_URL=${_API_URL}'
      - '.'

images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/argus-ai/drishtam-dashboard:$BUILD_ID'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/argus-ai/drishtam-dashboard:latest'

substitutions:
  _REGION: asia-south1
  _API_URL: https://drishtam-api-192403939373.asia-south1.run.app

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
